# Production site stack. Runs the prebuilt GHCR image behind the edge proxy.
# No host port is published: Caddy reaches the `site` service alias over the `edge`
# network. The image carries its own HEALTHCHECK (see Dockerfile).
# Deploy/update: zero-downtime via docker-rollout (spec 0019), which scales the
# service to two instances, waits for the new one's health, then removes the old:
#   IMAGE_TAG=sha-<commit> docker rollout -f compose.site.yml site
name: site # explicit project name so it never collides with the proxy stack

services:
  site:
    image: ghcr.io/mattmaynes/matthewmaynes:${IMAGE_TAG:-latest}
    # No container_name on purpose: docker-rollout (spec 0019) runs two
    # Compose-indexed instances (site-site-1 / site-site-2) during a rollout, so a
    # fixed name would block the overlap. The service keeps the `site` network
    # alias, which Caddy resolves via Docker DNS to whichever instances are live.
    restart: unless-stopped
    # Cohosted-box memory safety (feedback 0015): the zero-downtime rollout briefly
    # runs TWO site instances, and on the shared VM a spike here must never OOM the
    # whole box and take down the cohosted rogueoak stack (which is exactly what
    # happened once - see feedback 0015). Bound each instance well above its real
    # ~120MB SSR footprint, so this never trips in normal operation and only caps a
    # runaway/leak. The host still needs headroom for 2x + neighbours + swap; see the
    # capacity note in overview/architecture.md.
    mem_limit: 400m
    mem_reservation: 192m
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      SITE_URL: https://matthewmaynes.com
      # Server-side PostHog error tracking on (spec 0016). Set ONLY here, in the
      # deployed stack - never in the local docker-compose.yml or a local run - so
      # a local production build (which also runs NODE_ENV=production) never sends
      # server exceptions to the live project.
      POSTHOG_SERVER_CAPTURE: "1"
    env_file:
      # Contact-form secrets (spec 0008): RESEND_API_KEY, CONTACT_TO_EMAIL,
      # CONTACT_FROM_EMAIL. Created once on the host at deploy/docker/.env.site
      # (git-ignored via the .env* rule, chmod 600); untracked, so it survives the
      # deploy's `git reset --hard` (there is no `git clean`). required:false so a
      # missing file never fails the deploy - the route just fails closed (500).
      - path: .env.site
        required: false
    networks:
      - edge

# Shared with the proxy stack; created once on the host: `docker network create edge`.
networks:
  edge:
    external: true
