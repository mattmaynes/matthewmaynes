# Continuous deployment for matthewmaynes.com.
# Push to main -> verify (lint/build/test) -> build+push image to GHCR -> deploy
# to the server over SSH. A red verify or build never reaches deploy.
#
# Actions are pinned to commit SHAs (mutable tags are a supply-chain risk: this
# job has packages: write and the server runs the image as root). Dependabot
# (.github/dependabot.yml) proposes SHA bumps with the tag in a trailing comment.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Default to read-only; the build job opts into packages: write for itself only.
permissions:
  contents: read

# Never run two deploys to the same server at once; let an in-flight one finish.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/mattmaynes/matthewmaynes

jobs:
  # Same gate the PR runs (ci.yml), shared so the two can never drift apart.
  verify:
    uses: ./.github/workflows/verify.yml

  build:
    needs: verify
    runs-on: ubuntu-latest # native amd64, so no QEMU emulation for the image build
    permissions:
      contents: read
      packages: write # least privilege: only this job pushes to GHCR
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No cross-run build cache: the gha cache restored a stale `COPY . .`
          # layer and shipped old source. A clean build each run is the reliable
          # default; this app builds in about a minute. (feedback 0004)
          no-cache: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          # Pin the exact image built in this run (full-SHA tag from metadata-action),
          # so the running version is auditable and rollback is a one-line tag change.
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key (DEPLOY_KNOWN_HOSTS secret): authenticates the server,
          # so a MITM on a deploy cannot impersonate it. No trust-on-first-use.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=10 \
            "$USER@$HOST" "IMAGE_TAG='$IMAGE_TAG' bash -se" <<'REMOTE'
            set -euo pipefail
            cd ~/matthewmaynes
            # Force-sync to origin/main so a stray local edit on the server can't
            # wedge future deploys (unlike `git pull --ff-only`).
            git fetch --prune origin
            # Note the Caddyfile hash before the reset so we can tell whether this
            # deploy actually changed it (see the reload logic below).
            caddy_before=$(md5sum deploy/docker/Caddyfile 2>/dev/null | cut -d' ' -f1 || true)
            git reset --hard origin/main
            caddy_after=$(md5sum deploy/docker/Caddyfile | cut -d' ' -f1)
            # This repo owns the shared edge proxy (it routes every cohosted domain,
            # e.g. rogueoak.com). Create / bring it up if absent (idempotent). A
            # cohosted site repo ships only its own site stack joined to this
            # network - it does not manage the proxy.
            docker network inspect edge >/dev/null 2>&1 || docker network create edge
            # Validate the Caddyfile before applying it, so a syntax error fails the
            # deploy instead of taking the edge proxy down (Caddy has no healthcheck).
            docker run --rm -v "$HOME/matthewmaynes/deploy/docker/Caddyfile:/etc/caddy/Caddyfile:ro" \
              caddy:2-alpine caddy validate --adapter caddyfile --config /etc/caddy/Caddyfile
            docker compose -f deploy/docker/compose.proxy.yml up -d
            # `compose up -d` does NOT apply a changed Caddyfile: the file is a
            # read-only bind mount, so editing it is not a service change and the
            # container is not recreated or reloaded. When the Caddyfile changed,
            # reload explicitly; then verify every site block reached the running
            # config and restart as a guaranteed fallback (a long-lived container
            # has been observed to silently no-op a `reload`).
            if [ "$caddy_before" != "$caddy_after" ]; then
              docker exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true
              running=$(docker exec caddy sh -c 'wget -qO- http://localhost:2019/config/ 2>/dev/null' || true)
              for host in $(grep -oE '^[a-z0-9.-]+ \{' deploy/docker/Caddyfile | cut -d' ' -f1); do
                case "$running" in
                  *"\"$host\""*) ;;
                  *) echo "caddy reload did not apply $host - restarting caddy"; docker restart caddy; break ;;
                esac
              done
            fi
            export IMAGE_TAG
            # Pre-pull so the rollout's new container starts instantly (no pull mid-swap).
            docker compose -f deploy/docker/compose.site.yml pull

            # Zero-downtime deploy (spec 0019) via docker-rollout: scale the site
            # service to two instances, wait for the new one's HEALTHCHECK, then
            # remove the old - so Caddy (dynamic-A upstreams re-resolving the `site`
            # alias) always has a live backend. The plugin is a shell script that
            # runs on the host during a privileged deploy, so it is pinned to a
            # commit SHA and checksum-verified before use, like the SHA-pinned
            # Actions (feedback 0002, supply chain).
            # docker-rollout v0.13: github.com/Wowu/docker-rollout/releases/tag/v0.13
            ROLLOUT_SHA=39b8066d56cc1edc76d1ae898db46623cc93bc24
            ROLLOUT_SHA256=fa0df004de84747142cb627c55210aaa914bbae76666e7b95a2ac46805d81a84
            plugin="$HOME/.docker/cli-plugins/docker-rollout"
            if ! printf '%s  %s\n' "$ROLLOUT_SHA256" "$plugin" | sha256sum -c - >/dev/null 2>&1; then
              mkdir -p "$HOME/.docker/cli-plugins"
              tmp=$(mktemp)
              curl -fsSL "https://raw.githubusercontent.com/Wowu/docker-rollout/$ROLLOUT_SHA/docker-rollout" -o "$tmp"
              printf '%s  %s\n' "$ROLLOUT_SHA256" "$tmp" | sha256sum -c -
              chmod +x "$tmp"
              mv "$tmp" "$plugin"
            fi

            # One-time cutover from the pre-0019 container literally named `site`
            # (the old container_name): docker-rollout needs Compose-indexed names,
            # so hand over once (one last brief blip) then every later deploy is a
            # pure rollout. The name check self-clears once the indexed instance exists.
            if [ "$(docker container inspect -f '{{.Name}}' site 2>/dev/null)" = "/site" ]; then
              echo "spec 0019 cutover: replacing legacy 'site' container with a Compose-indexed instance"
              docker rm -f site
              docker compose -f deploy/docker/compose.site.yml up -d --wait
            else
              # Waits up to 90s for the new instance to pass its HEALTHCHECK (image
              # start-period is 15s), then a short grace so Caddy's 1s DNS refresh
              # picks up the new IP before the old container is removed. A broken
              # image never goes healthy, so the old instance keeps serving and the
              # deploy fails - a bad build cannot take the site down.
              docker rollout -t 90 --wait-after-healthy 5 -f deploy/docker/compose.site.yml site
            fi
            # Prune only THIS project's dangling images (label-scoped), so a
            # cohosted stack's images are never touched.
            docker image prune -f \
              --filter "label=org.opencontainers.image.source=https://github.com/mattmaynes/matthewmaynes"
          REMOTE

  # Warm the next/image optimizer cache on the freshly deployed site so the first
  # real visitor gets cache HITs instead of waiting on on-demand encodes. The
  # script crawls the image-bearing pages and requests each /_next/image variant.
  # Best-effort: a warming hiccup never fails an already-healthy deploy (it only
  # exits non-zero if the site is wholly unreachable). No deps (Node built-in
  # fetch), so no npm ci. (spec 0006)
  prewarm:
    needs: deploy
    runs-on: ubuntu-latest
    # The run-level concurrency group serializes deploys, so a stalled warm would
    # queue the next push's deploy behind it. Cap it (the script also times out
    # each request) so a wedged warm can never hold the deploy lane.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # matches the Dockerfile runtime (node:24-alpine)
      - run: node scripts/prewarm-images.mjs "$SITE_URL"
        env:
          SITE_URL: https://matthewmaynes.com
