# Reusable verification job: lint, resume PDF freshness, build, test.
# Called by ci.yml (on pull_request, to gate merges) AND deploy.yml (on push to
# main, before build+deploy) so both enforce the IDENTICAL gate. A check can
# never pass on a PR but fail post-merge (or the reverse) - the bug that let a
# stale resume.pdf through #21 and wedged every deploy after it.
#
# Actions are pinned to commit SHAs (mutable tags are a supply-chain risk).
# Dependabot (.github/dependabot.yml) proposes SHA bumps with the tag in a
# trailing comment.
name: verify

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # matches the Dockerfile runtime (node:24-alpine)
          cache: npm
      - run: npm ci
      - run: npm run lint
      # Fail if the resume page/data changed but the committed PDF was not
      # regenerated. A pure hash compare - no browser, so CI stays Chrome-free.
      - run: npm run resume:pdf:check
      # Fail if the privacy policy CONTENT changed but its "Last updated" date was
      # not stamped (npm run privacy:stamp). A pure content-hash compare that
      # ignores the date value, so a stale date can never ship silently.
      - run: npm run privacy:check
      # BLOG_FIXTURES_DIR is TEST-ONLY (feedback 0022): it injects the sample
      # draft/scheduled posts (tests/fixtures/blog, kept out of live content) so the
      # standalone artifact this build produces - which `npm test`'s smoke suite
      # reuses - contains the fixture previews. The DEPLOYED image is built
      # separately by the Dockerfile, which never sets this, so no sample post ships.
      - run: npm run build
        env:
          BLOG_FIXTURES_DIR: ${{ github.workspace }}/tests/fixtures/blog
      - run: npm test
        env:
          BLOG_FIXTURES_DIR: ${{ github.workspace }}/tests/fixtures/blog
